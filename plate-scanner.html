<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📷 สแกนทะเบียนรถ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif;
    background: #000;
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
  }
  h1 { font-size: 17px; font-weight: 600; margin-bottom: 12px; color: #fff; }
  .video-wrap {
    position: relative;
    width: 100%;
    max-width: 480px;
    border-radius: 12px;
    overflow: hidden;
    border: 3px solid white;
    background: #111;
  }
  video {
    width: 100%;
    display: block;
  }
  /* กรอบแนะนำตำแหน่งทะเบียน */
  .scan-frame {
    position: absolute;
    top: 35%; left: 10%; right: 10%; bottom: 35%;
    border: 2px dashed #FFC107;
    border-radius: 6px;
    pointer-events: none;
  }
  .scan-frame::before {
    content: 'จัดทะเบียนให้อยู่ในกรอบ';
    position: absolute;
    top: -24px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: #FFC107; white-space: nowrap;
    background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px;
  }
  .status {
    margin-top: 16px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: #FFE0B2;
    min-height: 40px;
    padding: 0 12px;
  }
  .status.success { color: #A5D6A7; font-size: 16px; font-weight: 700; }
  .status.error { color: #EF9A9A; }
  .btn-cancel {
    margin-top: 18px;
    padding: 12px 36px;
    background: #C0392B;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-cancel:active { transform: scale(0.96); }
  .scanning-dot {
    display: inline-block;
    width: 8px; height: 8px; border-radius: 50%;
    background: #4CAF50;
    margin-right: 6px;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
</style>
</head>
<body>

<h1>📷 สแกนทะเบียนรถ</h1>

<div class="video-wrap">
  <video id="video" autoplay playsinline muted></video>
  <div class="scan-frame"></div>
</div>

<div id="status" class="status">กำลังเปิดกล้อง...</div>

<button type="button" class="btn-cancel" onclick="cancelScan()">ยกเลิก</button>

<script>
// ============================================================
// ⚙️ CONFIG — แก้ตรงนี้ก่อนใช้งาน
// ============================================================
// 🔥 หลาย API Keys (เรียงตามลำดับ — ตัวบนสุดถูกใช้ก่อน)
const GEMINI_API_KEYS = [
  'AIzaSyAXf8_PSBv0tGOfkLiJJ6jIGgcxIaCCIAo', // Key #1
  'AIzaSyBCGyq4nVV7DOO3MN_Apx0FIh_l8poxB88', // Key #2
  'AIzaSyBNGLKqkBOqrmcQL71Y9f1NV6bqO21gU3Q', // Key #3
  'AIzaSyAhlyFkjSHG8MrI2geQQ5fI6VRwySwNx64', // Key #4
  'AIzaSyAWADpCdWaRUp8n5QAn6U04cg4wzEoJi9A'  // Key #5
];

const SCAN_INTERVAL_MS = 5000;       // สแกนทุก 5 วินาที (รองรับ multi-user)
const BACKOFF_AFTER_429_MS = 10000;  // ถ้าทุกตัวโดน 429 รอ 10 วิ

// 🔥 รายชื่อโมเดล: เรียงจากโควต้าเยอะสุดไปน้อยสุด
const MODELS_TO_TRY = [
  'gemini-3.1-flash-lite-preview', // พระเอก โควต้า 500/วัน 15/นาที
  'gemini-3-flash-preview',        // สำรอง (ซีรีส์ 3)
  'gemini-2.5-flash-lite',         // 20/วัน 10/นาที
  'gemini-3-flash',                // 20/วัน 5/นาที
  'gemini-2-flash',                // สำรองฉุกเฉิน
  'gemini-2.5-flash'               // คิวท้าย (เจอ limit บ่อย)
];

// 🔔 GAS Web App URL สำหรับส่ง email alert (ใส่ /exec URL ของ GAS Web App ของพี่)
const GAS_ALERT_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_DEPLOYMENT_ID/exec';
const ALERT_THROTTLE_MS = 60 * 60 * 1000; // ส่งเมลซ้ำได้แค่ 1 ครั้งต่อชั่วโมง

// ============================================================
let stream = null;
let scanInterval = null;
let scanInProgress = false;
let attemptCount = 0;
let pauseUntilTs = 0;          // 🔥 ใช้กับ 429 backoff
let lastUsedLabel = '';        // Label ของ key/model ที่ใช้ล่าสุด
let lastWorkingKeyIdx = 0;     // เริ่มจาก key ตัวไหน (ตัวที่เคยใช้ได้)
let lastWorkingModelIdx = 0;   // เริ่มจาก model ตัวไหน (ตัวที่เคยใช้ได้)

// 🔥 Smart Caching เพื่อกระจายโหลด + เลี่ยงโมเดลที่ไม่มี
const dead404 = new Set();         // "keyIdx|model" ที่ 404 → ถาวรใน session
const cooldownUntil = {};          // "keyIdx|model" → timestamp ที่กลับมาใช้ได้
const COOLDOWN_429_MS = 60 * 1000; // โดน 429 → พัก 60 วินาที ก่อนลองคู่นี้ใหม่

const videoEl = document.getElementById('video');
const statusEl = document.getElementById('status');

function setStatus(text, type) {
  statusEl.className = 'status' + (type ? ' ' + type : '');
  statusEl.innerHTML = text;
}

// ============================================================
// เปิดกล้อง
// ============================================================
async function startCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setStatus('❌ เบราว์เซอร์นี้ไม่รองรับการเปิดกล้อง', 'error');
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    videoEl.srcObject = stream;
    setStatus('<span class="scanning-dot"></span>🔍 กำลังสแกน...');
    scanInterval = setInterval(scanFrame, SCAN_INTERVAL_MS);
  } catch (err) {
    setStatus('❌ เปิดกล้องไม่ได้: ' + err.message + '<br><small>กรุณาอนุญาตการเข้าถึงกล้อง แล้ว refresh</small>', 'error');
  }
}

// ============================================================
// จับภาพแล้วส่งให้ Gemini
// ============================================================
async function scanFrame() {
  if (scanInProgress) return;
  if (!videoEl.videoWidth || videoEl.readyState < 2) return;

  // 🔥 Smart Backoff: ถ้ายังอยู่ในช่วงพักจาก rate limit ให้ข้ามรอบนี้
  if (Date.now() < pauseUntilTs) {
    const remain = Math.ceil((pauseUntilTs - Date.now()) / 1000);
    setStatus('⏸️ พักจาก rate limit อีก ' + remain + ' วินาที...');
    return;
  }

  scanInProgress = true;
  attemptCount++;

  // จับภาพจาก video → canvas
  const canvas = document.createElement('canvas');
  let w = videoEl.videoWidth, h = videoEl.videoHeight;
  if (w > 1024) { h = Math.round(h * 1024 / w); w = 1024; }
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(videoEl, 0, 0, w, h);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
  const base64 = dataUrl.split(',')[1];

  setStatus('<span class="scanning-dot"></span>🤖 AI กำลังอ่าน... (' + (lastUsedLabel || 'K1') + ' · #' + attemptCount + ')');

  try {
    const plate = await callGemini(base64);
    if (plate && isValidThaiPlate(plate)) {
      onPlateFound(plate);
    } else {
      setStatus('<span class="scanning-dot"></span>🔍 ยังไม่ชัด... ลองขยับใกล้ขึ้น');
    }
  } catch (err) {
    if (err.is429) {
      // ทุกโมเดลโดน rate limit → พักนานขึ้นก่อน retry
      pauseUntilTs = Date.now() + BACKOFF_AFTER_429_MS;
      setStatus('⚠️ AI โควต้าเต็มชั่วคราว — พัก ' + (BACKOFF_AFTER_429_MS/1000) + ' วินาที...');
    } else {
      setStatus('⚠️ ' + err.message + '<br><small>กำลังลองใหม่...</small>');
    }
  } finally {
    scanInProgress = false;
  }
}

// ============================================================
// เรียก Gemini API พร้อม fallback หลายโมเดล
// ============================================================
async function callGemini(base64Data) {
  const prompt = 'อ่านป้ายทะเบียนรถในภาพนี้ ตอบกลับเป็น JSON เท่านั้น: {"plate": "ข้อความที่อ่านได้"}\n\nกฎการอ่าน:\n- เอาเฉพาะ "ตัวหลัก" ของทะเบียนเท่านั้น (เลขทะเบียน + ตัวอักษรถ้ามี)\n- ห้ามใส่ชื่อจังหวัดที่อยู่ด้านล่างป้าย เช่น "นนทบุรี", "กรุงเทพมหานคร"\n- ห้ามใส่คำว่า "THAILAND" หรือเลขปีภาษี\n\nตัวอย่างรูปแบบที่พบบ่อย:\n- รถยนต์ทั่วไป: "1กข 2345"\n- รถบรรทุก/รถพ่วง: "71-1705" หรือ "70-1234"\n- รถตู้/แท็กซี่: "กท 1234"\n- ป้ายเหลือง/รถสาธารณะ: "30-1234" หรือ "1ก 1234"\n\nถ้าไม่เห็นป้ายทะเบียนชัดเจนเลย ให้ตอบ {"plate": ""}';

  const payload = {
    contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: 'image/jpeg', data: base64Data }}]}],
    generationConfig: { responseMimeType: 'application/json' }
  };

  let lastErr = null;
  let triedAny = false;       // มีการยิง API จริงไหม (ไม่นับที่ skip)
  let only429 = true;          // ทุกการยิงจริงโดน 429 หรือเปล่า
  let stats = { skipped: 0, tried: 0, _404: 0, _429: 0, _other: 0 };

  // 🔥 วน Key เริ่มจาก key ที่เคยใช้ได้
  for (let ki = 0; ki < GEMINI_API_KEYS.length; ki++) {
    const keyIdx = (lastWorkingKeyIdx + ki) % GEMINI_API_KEYS.length;
    const apiKey = GEMINI_API_KEYS[keyIdx];
    if (!apiKey || !apiKey.trim()) continue;

    // 🔥 วน Model ภายใน key นี้
    for (let mi = 0; mi < MODELS_TO_TRY.length; mi++) {
      const modelIdx = (lastWorkingModelIdx + mi) % MODELS_TO_TRY.length;
      const model = MODELS_TO_TRY[modelIdx];
      const cacheKey = keyIdx + '|' + model;

      // 🔥 Skip ถ้าเคย 404 แล้ว (ไม่มีโมเดลนี้ในบัญชีนี้)
      if (dead404.has(cacheKey)) { stats.skipped++; continue; }

      // 🔥 Skip ถ้ายัง cooldown จาก 429 อยู่
      if (cooldownUntil[cacheKey] && Date.now() < cooldownUntil[cacheKey]) {
        stats.skipped++;
        continue;
      }

      try {
        triedAny = true;
        stats.tried++;
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (resp.status === 429) {
          stats._429++;
          // 🔥 พักคู่นี้ไว้ 60 วินาที ก่อนลองใหม่
          cooldownUntil[cacheKey] = Date.now() + COOLDOWN_429_MS;
          lastErr = new Error('K' + (keyIdx+1) + '·' + model + ' โดน 429');
          continue;
        }
        if (resp.status === 401 || resp.status === 403) {
          // Key ใช้ไม่ได้ (auth/restriction) → จำว่าตายไว้ทุก model สำหรับ key นี้
          only429 = false;
          stats._other++;
          MODELS_TO_TRY.forEach(m => dead404.add(keyIdx + '|' + m));
          lastErr = new Error('K' + (keyIdx+1) + ' invalid (' + resp.status + ')');
          break; // ออกจาก loop model ไป key ถัดไป
        }
        if (resp.status === 404) {
          // 🔥 โมเดลไม่มีใน account นี้ → จำไว้ ไม่ลองอีก
          only429 = false;
          stats._404++;
          dead404.add(cacheKey);
          lastErr = new Error('K' + (keyIdx+1) + '·' + model + ' ไม่มี (404)');
          continue;
        }
        if (resp.status === 503) {
          only429 = false;
          stats._other++;
          // ชั่วคราว: cool 30 วิ
          cooldownUntil[cacheKey] = Date.now() + 30000;
          lastErr = new Error(model + ' busy (503)');
          continue;
        }
        if (!resp.ok) {
          only429 = false;
          stats._other++;
          const errText = await resp.text();
          lastErr = new Error('Error ' + resp.status + ': ' + errText.slice(0, 80));
          continue;
        }

        // 🎯 สำเร็จ
        lastWorkingKeyIdx = keyIdx;
        lastWorkingModelIdx = modelIdx;
        lastUsedLabel = 'K' + (keyIdx+1) + '·' + model.replace('gemini-', '').replace('-preview', '');

        const json = await resp.json();
        if (!json.candidates || !json.candidates.length) {
          only429 = false;
          stats._other++;
          continue;
        }
        const parsed = JSON.parse(json.candidates[0].content.parts[0].text);
        return String(parsed.plate || '').trim();
      } catch (err) {
        only429 = false;
        lastErr = err;
      }
    } // จบลูป model
  } // จบลูป key

  // มาถึงตรงนี้ = ทุก key ทุก model ใช้ไม่ได้ทั้งหมดในรอบนี้
  console.log('[plate-scanner] All exhausted', stats);

  // ถ้าทุกการยิงจริงเป็น 429 หมด (หรือ skip ทั้งหมดเพราะ cooldown) → backoff + เมล
  if (only429 || !triedAny) {
    sendRateLimitAlert(); // 📧 ส่งเมล (throttled 1 ชม.)
    const e = new Error('ทุก Keys + ทุก Models เต็ม (' + stats._429 + ' รอ cooldown · ' + stats.skipped + ' skip)');
    e.is429 = true;
    throw e;
  }

  if (lastErr) throw lastErr;
  return '';
}

// ============================================================
// 📧 ส่ง Email Alert ผ่าน GAS (no-cors fire-and-forget)
// ============================================================
async function sendRateLimitAlert() {
  if (!GAS_ALERT_URL || GAS_ALERT_URL.includes('REPLACE_WITH')) {
    console.warn('GAS_ALERT_URL ยังไม่ได้ตั้งค่า');
    return;
  }

  // Throttle: ส่งเมลซ้ำได้แค่ 1 ครั้งต่อชั่วโมง
  const lastTs = parseInt(localStorage.getItem('lastRateAlertTs') || '0');
  if (Date.now() - lastTs < ALERT_THROTTLE_MS) {
    console.log('Alert throttled (sent recently)');
    return;
  }
  localStorage.setItem('lastRateAlertTs', Date.now().toString());

  try {
    await fetch(GAS_ALERT_URL, {
      method: 'POST',
      mode: 'no-cors',  // fire-and-forget (ไม่ต้องอ่าน response)
      headers: { 'Content-Type': 'text/plain' },  // หลีก preflight
      body: JSON.stringify({
        action: 'rate_limit_alert',
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent.slice(0, 200),
        keysCount: GEMINI_API_KEYS.length,
        modelsCount: MODELS_TO_TRY.length
      })
    });
    console.log('📧 Alert sent to GAS');
  } catch (err) {
    console.warn('Send alert failed:', err);
  }
}

// ============================================================
// เช็คว่าเป็นทะเบียนไทยที่ valid ไหม
// รองรับ: รถยนต์ (1กข 2345), รถบรรทุก (71-1705), รถตู้ (กท 1234)
// เกณฑ์: ต้องมีตัวเลข ≥ 3 ตัว + ความยาว ≥ 4
// ============================================================
function isValidThaiPlate(text) {
  if (!text || text.length < 4) return false;

  // ตัดสตริงที่มักเป็น false positive
  const cleaned = text.replace(/THAILAND/gi, '').replace(/นนทบุรี|กรุงเทพ\S*|เชียงใหม่|ภูเก็ต|ชลบุรี|ระยอง|สมุทร\S*|ปทุมธานี/g, '').trim();
  if (cleaned.length < 4) return false;

  // ต้องมีตัวเลขอย่างน้อย 3 ตัว (ทะเบียนไทยส่วนใหญ่มีเลข 4 ตัวอยู่แล้ว)
  const digitMatches = cleaned.match(/\d/g);
  if (!digitMatches || digitMatches.length < 3) return false;

  // ผ่านครบ → ยอมรับเลย (ไม่บังคับว่าต้องมีอักษรไทย เพราะรถบรรทุกมีแค่เลข)
  return true;
}

// ============================================================
// เจอทะเบียนแล้ว → ส่งกลับ GAS + ปิดหน้าต่าง
// ============================================================
function onPlateFound(plate) {
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  setStatus('✅ อ่านได้: ' + plate, 'success');

  // ส่งกลับไปหน้า GAS ผ่าน postMessage
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({ type: 'PLATE_SCANNED', plate: plate }, '*');
  }

  // หยุดกล้อง + ปิดหน้าต่าง
  setTimeout(() => {
    stopCamera();
    window.close();
  }, 900);
}

function cancelScan() {
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({ type: 'PLATE_CANCELLED' }, '*');
  }
  stopCamera();
  window.close();
}

function stopCamera() {
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

window.addEventListener('beforeunload', stopCamera);
window.addEventListener('load', startCamera);
</script>

</body>
</html>
